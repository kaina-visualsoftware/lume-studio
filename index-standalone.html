    // Hooks
    function useCountUp(target, duration = 1500) {
      const [count, setCount] = useState(0);
      const startTime = useRef(null);
      const startValue = useRef(0);

      useEffect(() => {
        startValue.current = count;
        startTime.current = null;
        const animate = (timestamp) => {
          if (!startTime.current) startTime.current = timestamp;
          const elapsed = timestamp - startTime.current;
          const progress = Math.min(elapsed / duration, 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          const currentValue = startValue.current + (target - startValue.current) * easeOut;
          setCount(Math.round(currentValue * 100) / 100);
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [target, duration]);

      return count;
    }

    function useRealTimeClock() {
      const [time, setTime] = useState(new Date());
      useEffect(() => {
        const interval = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(interval);
      }, []);
      return time;

    function KPICard({ kpi, index }) {
      const animatedValue = useCountUp(kpi.value, 1500 + index * 200);
      const percentageChange = ((kpi.value - kpi.previousValue) / kpi.previousValue * 100).toFixed(1);
      const isPositive = kpi.trend === 'up';
      const formatValue = (value) => {
        if (kpi.unit === 'currency') return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value);
        if (kpi.unit === 'percentage') return `${value.toFixed(2)}%`;
        return new Intl.NumberFormat('pt-BR').format(value);
      };
      const trendColor = isPositive ? colors.success : colors.error;
      return (
        <div style={styles.kpiCard}>
          <div style={styles.kpiHeader}>
            <span style={styles.kpiLabel}>{kpi.label}</span>
            <div style={{ ...styles.kpiTrend, color: trendColor, background: isPositive ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)' }}>
              {kpi.trend === 'up' ? <IconArrowUp size={12} color={trendColor} /> : <IconArrowDown size={12} color={trendColor} />}
              <span style={{ ...styles.kpiTrendText, color: trendColor }}>{Math.abs(parseFloat(percentageChange))}%</span>
            </div>
          </div>
          <div style={styles.kpiValue}>{formatValue(animatedValue)}</div>
          {kpi.unit === 'percentage' && <div style={styles.kpiSubValue}>do total de usuários</div>}
        </div>
      );
    }

                  </td>
                  <td style={{ ...styles.tableTd, color: colors.textMuted }}>{new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: '2-digit' }).format(order.date)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12, marginTop: 16 }}>
            <button style={{ opacity: page === 0 ? 0.3 : 1, background: colors.bgTertiary, border: 'none', borderRadius: 6, padding: 6, cursor: 'pointer' }} onClick={() => onPageChange(page - 1)} disabled={page === 0}><IconChevronLeft size={14} /></button>
            <span style={{ fontSize: 12, color: colors.textMuted }}>{page + 1} / {totalPages}</span>
            <button style={{ opacity: page === totalPages - 1 ? 0.3 : 1, background: colors.bgTertiary, border: 'none', borderRadius: 6, padding: 6, cursor: 'pointer' }} onClick={() => onPageChange(page + 1)} disabled={page === totalPages - 1}><IconChevronRight size={14} /></button>
          </div>
        </div>
      );
    }

    function Heatmap({ data }) {
      const days = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
      const getColor = (value) => {
        if (value < 20) return colors.bgTertiary;
        if (value < 40) return colors.accent + '40';
        if (value < 60) return colors.accent + '80';
        if (value < 80) return colors.accent + 'CC';
        return colors.accent;
      };
      return (
        <div style={styles.heatmapContainer}>
          <h3 style={styles.sectionTitle}>Atividade da Semana</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
            {data.map((row, dayIndex) => (
              <div key={dayIndex} style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
                <span style={{ fontSize: 9, color: colors.textMuted, width: 20 }}>{days[dayIndex]}</span>
                {row.map((value, hourIndex) => (
                  <div key={hourIndex} style={{ width: 8, height: 8, flex: 1, borderRadius: 1, background: getColor(value), minWidth: '8px', maxWidth: '8px' }} />
                ))}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TopProductsChart({ products }) {
      const maxSales = Math.max(...products.map(p => p.sales));
      return (
        <div style={styles.topProductsContainer}>
          <h3 style={styles.sectionTitle}>Produtos Mais Vendidos</h3>
          {products.map((product, index) => (
            <div key={product.name} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: colors.accentHover, width: 16 }}>{index + 1}</span>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                  <span style={{ fontSize: 12, color: colors.textSecondary }}>{product.name}</span>
                  <span style={{ fontSize: 11, color: colors.textMuted }}>{product.sales}</span>
                </div>
                <div style={{ height: 4, background: colors.bgTertiary, borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${(product.sales / maxSales) * 100}%`, background: `linear-gradient(90deg, ${colors.accent}, ${colors.accentHover})`, borderRadius: 2 }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ActivityFeed({ events }) {
      const getIcon = (type) => {
        switch (type) {
          case 'order': return <IconOrders size={12} color={colors.accentHover} />;
          case 'user': return <IconUsers size={12} color={colors.info} />;
          case 'payment': return <span style={{ fontSize: 12, color: colors.success }}>$</span>;
          case 'alert': return <span style={{ fontSize: 12, color: colors.warning }}>!</span>;
        }
      };
      const getTimeAgo = (date) => {
        const now = new Date();
        const diff = Math.floor((now.getTime() - date.getTime()) / 60000);
        if (diff < 60) return `${diff}m`;
        return `${Math.floor(diff / 60)}h`;
      };
      return (
        <div style={styles.activityContainer}>
          <h3 style={styles.sectionTitle}>Atividade Recente</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {events.map(event => (
              <div key={event.id} style={{ display: 'flex', gap: 10 }}>
                <div style={{ width: 24, height: 24, borderRadius: 6, background: colors.bgTertiary, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  {getIcon(event.type)}
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 12, color: colors.textSecondary, margin: 0, lineHeight: 1.4 }}>{event.message}</p>
                  <span style={{ fontSize: 10, color: colors.textMuted }}>{getTimeAgo(event.timestamp)}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [activeItem, setActiveItem] = useState('dashboard');
      const [searchQuery, setSearchQuery] = useState('');
      const [notificationCount] = useState(3);
      const [dateRange, setDateRange] = useState('30d');
      const currentTime = useRealTimeClock();
      const [page, setPage] = useState(0);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 1200);
        return () => clearTimeout(timer);
      }, []);

      if (loading) {
        return (
          <div style={styles.loadingContainer}>
            <div style={{ width: 32, height: 32, border: `2px solid ${colors.border}`, borderTop: `2px solid ${colors.accentHover}`, borderRadius: 6, animation: 'spin 0.8s linear infinite' }} />
            <style>{`@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`}</style>
            <div style={{ color: colors.textMuted, fontSize: 12, marginTop: 12 }}>Carregando...</div>
          </div>
        );
      }

      return (
        <div style={styles.dashboard}>
          <Sidebar activeItem={activeItem} onItemChange={setActiveItem} />
          <div style={styles.mainContent}>
            <Header searchQuery={searchQuery} onSearchChange={setSearchQuery} notificationCount={notificationCount} dateRange={dateRange} onDateRangeChange={setDateRange} currentTime={currentTime} />
            <div style={styles.content}>
              <div style={styles.kpiGrid}>
                {mockKPIs.map((kpi, index) => <KPICard key={kpi.id} kpi={kpi} index={index} />)}
              </div>
              <div style={styles.contentGrid}>
                <div style={styles.mainSection}>
                  <RevenueChart data={mockChartData} />
                  <OrdersTable orders={mockOrders} page={page} onPageChange={setPage} />
                </div>
                <div style={styles.sideSection}>
                  <Heatmap data={mockHeatmap} />
                  <TopProductsChart products={mockTopProducts} />
                  <ActivityFeed events={mockActivity} />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
